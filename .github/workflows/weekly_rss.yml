name: Weekly RSS Curation

permissions:
  contents: write

on:
  schedule:
    - cron: "0 2 * * 1"  # Monday 02:00 UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------
      # Compute the report filename (RSS-feed_YYYY-MM-DD_YYYY-WNN.md)
      # and export it so later steps can reference it.
      # ----------------------------------------------------
      - name: Set report filename
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          WEEK=$(date -u +"%G-W%V")
          echo "REPORT_FILE=output/RSS-feed_${DATE}_${WEEK}.md" >> $GITHUB_ENV

      # ----------------------------------------------------
      # Run the pipeline
      # ----------------------------------------------------
      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Fetching feeds..."
          python scripts/fetch_feeds.py
          echo "Ranking..."
          python scripts/rank_articles.py
          echo "Generating markdown..."
          python scripts/generate_markdown.py
          echo "Finished."

      # ----------------------------------------------------
      # Email the curated results
      # ----------------------------------------------------
      - name: Email results
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Weekly RSS Digest from RSS_Agent"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: RSS Agent <${{ secrets.GMAIL_EMAIL }}>
          body: |
            Your weekly curated RSS digest is ready.

            See the attached file for details.

          attachments: ${{ env.REPORT_FILE }}

      # ----------------------------------------------------
      # Reset the raw feed cache to start fresh next week
      # ----------------------------------------------------
      - name: Reset raw feed cache
        run: |
          echo "[]" > cache/raw_feeds.json

      # ----------------------------------------------------
      # Commit cache state (seen_ids + reset raw_feeds)
      # ----------------------------------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/MarleneVoit/rss-article-digest.git
          if [ -n "$(git status --porcelain)" ]; then
            git add cache/ output/
            git commit -m "Weekly RSS update: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes to cache — nothing to commit."
          fi
